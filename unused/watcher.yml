name: External Repo Watcher

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:

jobs:
  vencord-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Get Vencord Commit
        id: get_sha
        run: |
          SHA=$(curl -s https://api.github.com/repos/Vendicated/Vencord/commits/main | jq -r '.sha')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "$SHA" > vencord_sha.txt

      - name: Check Cache
        id: cache
        uses: actions/cache@v4
        with:
          path: vencord_sha.txt
          key: vencord-${{ steps.get_sha.outputs.sha }}

      - name: Notify Discord
        if: steps.cache.outputs.cache-hit != 'true'
        uses: sarisia/actions-status-discord@v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "Vencord Update Detected"
          description: "New commit: https://github.com/Vendicated/Vencord/commit/${{ steps.get_sha.outputs.sha }}"
          color: 0xac02be
          username: GitHub - Vencord
          avatar_url: ${{ secrets.AVATAR_URL }}

  midnight-mocha-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Get File Commit
        id: get_sha
        run: |
          SHA=$(curl -s "https://api.github.com/repos/refact0r/midnight-discord/commits?path=themes/flavors/midnight-catppuccin-mocha.theme.css&page=1&per_page=1" | jq -r '.[0].sha')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "$SHA" > mocha_sha.txt

      - name: Check Cache
        id: cache
        uses: actions/cache@v4
        with:
          path: mocha_sha.txt
          key: mocha-${{ steps.get_sha.outputs.sha }}

      - name: Notify Discord
        if: steps.cache.outputs.cache-hit != 'true'
        uses: sarisia/actions-status-discord@v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "Midnight Mocha Theme Update"
          description: "Theme file updated: https://github.com/refact0r/midnight-discord/commit/${{ steps.get_sha.outputs.sha }}"
          color: 0xac02be
          username: GitHub - Midnight-mocha theme
          avatar_url: ${{ secrets.AVATAR_URL }}

  midnight-main-watch:
    runs-on: ubuntu-latest
    steps:
      - name: Get File Commit
        id: get_sha
        run: |
          SHA=$(curl -s "https://api.github.com/repos/refact0r/midnight-discord/commits?path=build/midnight.css&page=1&per_page=1" | jq -r '.[0].sha')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "$SHA" > midnight_sha.txt

      - name: Check Cache
        id: cache
        uses: actions/cache@v4
        with:
          path: midnight_sha.txt
          key: midnight-${{ steps.get_sha.outputs.sha }}

      - name: Notify Discord
        if: steps.cache.outputs.cache-hit != 'true'
        uses: sarisia/actions-status-discord@v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "Midnight Main CSS Update"
          description: "Main CSS updated: https://github.com/refact0r/midnight-discord/commit/${{ steps.get_sha.outputs.sha }}"
          color: 0xac02be
          username: GitHub - Midnight theme
          avatar_url: ${{ secrets.AVATAR_URL }}
